<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quem Sou Eu?</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tela categorias" id="categorias">

  <div class="header">
    <h1>Quem Sou EU?</h1>
  </div>

  <div class="grid">
    <button class="card amarelo" onclick="selecionarCategoria('animais')">
      🐶
      <span>Animais</span>
    </button>

    <button class="card azul" onclick="selecionarCategoria('objetos')">
      📦
      <span>Objetos</span>
    </button>

    <button class="card vermelho" onclick="selecionarCategoria('filmes')">
      🎬
      <span>Filmes</span>
    </button>

    <button class="card verde" onclick="selecionarCategoria('frutas')">
      🍎
      <span>Frutas</span>
    </button>

    <button class="card verde" onclick="selecionarCategoria('frutas')">
      🍎
      <span>Frutas</span>
    </button>

    <button class="card verde" onclick="selecionarCategoria('frutas')">
      🍎
      <span>Frutas</span>
    </button>
  </div>

</div>

<div class="tela" id="instrucao">
  <h1 id="tema"></h1>

  
  <p>Coloque o celular na testa</p>
  <p>Você tem <strong>60 segundos</strong></p>
  <p>⬆️ Virar para cima = Acertou</p>
  <p>⬇️ Virar para baixo = Passar</p>
  <button onclick="iniciarJogo()">Começar</button>
</div>

<div class="tela jogo" id="jogo">
  <div class="topo">
    <span id="tempo">60</span>
    <span id="placar">0</span>
  </div>

  <div id="contadorInicial" class="contador"></div>

  <h1 id="palavra"></h1>
</div>

<div class="tela" id="resultado">
  <h1>Resultado</h1>
  <h2 id="totalAcertos"></h2>
  <div id="listaResultado"></div>
  <button onclick="voltarInicio()">Voltar</button>
</div>

<script src="script.js"></script>
</body>
</html>
